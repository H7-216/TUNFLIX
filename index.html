<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="Image JPEG.jpeg">
    <title>TUNFLIX - Authentification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        
        .brand-font {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
        }
        
        .auth-container {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(229, 9, 20, 0.3);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(229, 9, 20, 0.1) inset;
            max-width: 480px;
            width: 100%;
            padding: 48px 32px;
            animation: floatIn 0.6s ease-out;
        }
        
        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .input-code {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #333;
            border-radius: 16px;
            padding: 20px 24px;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 8px;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
            font-family: 'Inter', monospace;
        }
        
        .input-code:focus {
            border-color: #e50914;
            outline: none;
            box-shadow: 0 0 0 3px rgba(229, 9, 20, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }
        
        .input-code::placeholder {
            letter-spacing: normal;
            font-size: 16px;
            color: #666;
        }
        
        .btn-netflix {
            background: linear-gradient(135deg, #e50914 0%, #b00710 100%);
            border-radius: 16px;
            padding: 18px 32px;
            font-weight: 700;
            font-size: 18px;
            color: white;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-netflix:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -10px rgba(229, 9, 20, 0.5);
        }
        
        .btn-netflix:active {
            transform: translateY(0);
        }
        
        .btn-netflix::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(transparent 0%, rgba(255, 255, 255, 0.1) 50%, transparent 100%);
            transform: rotate(30deg);
            transition: transform 0.5s ease;
        }
        
        .btn-netflix:hover::after {
            transform: rotate(30deg) translate(20%, 20%);
        }
        
        .error-message {
            color: #e50914;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            min-height: 24px;
            font-weight: 500;
            animation: shake 0.3s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .snapchat-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            color: white;
            text-decoration: none;
            font-weight: 500;
            margin-top: 32px;
            backdrop-filter: blur(10px);
        }
        
        .snapchat-link:hover {
            background: #fffc00;
            border-color: #fffc00;
            color: black;
            transform: scale(1.05);
            box-shadow: 0 10px 25px -5px rgba(255, 252, 0, 0.4);
        }
        
        .snapchat-link:hover svg {
            filter: brightness(0);
        }
        
        .dot-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(229, 9, 20, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            font-size: 64px;
            background: linear-gradient(135deg, #e50914 0%, #ff4d4d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        
        .subtitle {
            color: #aaa;
            font-size: 16px;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }
        
        .feature-badge {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 32px 0;
            flex-wrap: wrap;
        }
        
        .badge {
            background: rgba(229, 9, 20, 0.1);
            border: 1px solid rgba(229, 9, 20, 0.2);
            padding: 8px 16px;
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .badge svg {
            width: 16px;
            height: 16px;
            color: #e50914;
        }
        
        .footer-note {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="dot-pattern"></div>
    
    <div class="auth-container">
        <!-- Logo -->
        <div class="logo-container">
            <div class="logo brand-font">TUNFLIX</div>
            <div class="subtitle">Streaming Premium • Accès Privé</div>
        </div>
        
        <!-- Feature Badges -->
        <div class="feature-badge">
            <div class="badge">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                HD
            </div>
            <div class="badge">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                4K Ultra
            </div>
            <div class="badge">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Exclusivités
            </div>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div style="margin-bottom: 24px;">
                <label style="display: block; color: #aaa; font-size: 14px; margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;">
                    🔐 CODE D'ACCÈS
                </label>
                <input type="password" 
                       id="codeInput" 
                       class="input-code" 
                       placeholder="• • • •"
                       maxlength="4"
                       pattern="[0-9]*"
                       inputmode="numeric"
                       autofocus
                       required>
            </div>
            
            <button type="submit" class="btn-netflix">
                <span style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                    </svg>
                    ACCÉDER À TUNFLIX
                </span>
            </button>
            
            <div id="errorMessage" class="error-message"></div>
        </form>
        
        <!-- Snapchat Footer Link -->
        <a href="https://www.snapchat.com/add/h7_06200?share_id=u_T56Mv5TmOcaZ8QpB6lZw&locale=fr_FR" 
           target="_blank" 
           rel="noopener noreferrer"
           class="snapchat-link">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12.206 22.924c-.423 0-.815-.029-1.178-.086-.223-.036-.468-.122-.639-.168a3.13 3.13 0 0 0-.418-.088c-.327-.038-.643.008-.969.082-.416.096-.824.274-1.244.313-.707.066-1.378-.123-1.97-.521-.416-.279-.745-.648-1.008-1.06-.305-.478-.51-1.006-.642-1.557-.096-.404-.12-.82-.175-1.231-.035-.262-.11-.516-.199-.765-.242-.684-.705-1.163-1.348-1.521-.785-.435-1.667-.585-2.55-.439-.291.048-.572.12-.853.122-.334.002-.586-.125-.734-.396-.165-.299-.103-.623.145-.945.304-.393.703-.692 1.143-.926.844-.447 1.765-.714 2.682-.924.446-.102.559-.181.65-.617.036-.177.051-.358.077-.537.152-1.079.097-2.122-.34-3.147-.647-1.519-2.087-2.499-3.78-2.49-.496.003-.977.1-1.43.271-.551.209-1.022.509-1.362.93-.259.321-.336.682-.177.986.148.282.464.441.891.441.244 0 .505-.055.759-.126.623-.174 1.004-.063 1.245.315.205.322.178.73-.044 1.089-.223.362-.527.649-.903.874-.763.455-1.609.72-2.472.882-.32.06-.525.324-.527.604-.005.707.148 1.358.479 1.953.567 1.018 1.466 1.691 2.67 1.954.168.036.336.064.506.097.014.003.028.015.048.03.162.122.084.314.073.497-.024.445-.108.88-.258 1.301-.207.582-.493 1.126-.829 1.64-.272.414-.596.786-.974 1.102-.315.264-.66.476-1.036.631-.583.238-1.178.38-1.798.45-.406.045-.826.019-1.234-.032-.269-.034-.462-.226-.462-.464 0-.096.037-.194.103-.277.202-.252.49-.395.813-.449.336-.056.683-.008 1.022.07.257.06.515.142.777.149.459.011.789-.274.773-.646-.006-.131-.051-.263-.143-.378-.19-.235-.522-.334-.884-.341-.304-.006-.61.065-.907.171-.276.099-.539.231-.81.315-.357.111-.714.149-1.023.053-.339-.105-.547-.399-.529-.732.017-.307.257-.556.584-.664.449-.149.907-.245 1.365-.329.896-.165 1.787-.35 2.638-.655.297-.106.59-.223.865-.367.74-.389 1.223-.941 1.419-1.762.087-.367.09-.743.068-1.118-.019-.311.017-.625.07-.934.061-.36.159-.711.277-1.055.157-.459.372-.898.613-1.319.097-.168.206-.332.299-.504.036-.065.014-.137-.018-.215-.119-.283-.375-.425-.727-.45-.344-.024-.654.117-.967.266-.431.204-.828.468-1.228.73-.184.12-.381.221-.567.332-.144.087-.292.151-.454.191-.188.             </svg>
            <span>Rejoignez-moi sur Snapchat</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
            </svg>
        </a>
        
        <div class="footer-note">
            © 2024 TUNFLIX. Accès réservé aux membres.
        </div>
    </div>

    <script>
        const VALID_CODE = "1508";
        const REDIRECT_URL = "tunflix.html";
        
        // Vérifier si déjà authentifié
        if (localStorage.getItem('tunflix_auth') === 'true') {
            window.location.href = REDIRECT_URL;
        }
        
        function handleLogin(event) {
            event.preventDefault();
            
            const codeInput = document.getElementById('codeInput');
            const errorMessage = document.getElementById('errorMessage');
            const code = codeInput.value.trim();
            
            // Animation de chargement
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span style="display: flex; align-items: center; justify-content: center; gap: 12px;"><svg class="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> VÉRIFICATION...</span>';
            submitBtn.disabled = true;
            
            setTimeout(() => {
                if (code === VALID_CODE) {
                    // Code correct
                    errorMessage.style.color = '#4ade80';
                    errorMessage.innerHTML = '✓ Accès autorisé! Redirection...';
                    
                    // Stocker l'authentification
                    localStorage.setItem('tunflix_auth', 'true');
                    
                    // Rediriger vers la page principale
                    setTimeout(() => {
                        window.location.href = REDIRECT_URL;
                    }, 1000);
                } else {
                    // Code incorrect
                    errorMessage.style.color = '#e50914';
                    errorMessage.innerHTML = '✗ Code incorrect. Veuillez réessayer.';
                    
                    // Secouer l'input
                    codeInput.style.animation = 'shake 0.3s ease';
                    setTimeout(() => {
                        codeInput.style.animation = '';
                    }, 300);
                    
                    codeInput.value = '';
                    codeInput.focus();
                    
                    // Restaurer le bouton
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            }, 800);
            
            return false;
        }
        
        // Auto-focus et restrictions (que des chiffres)
        document.getElementById('codeInput').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4);
        });
        
        // Gérer la touche Entrée
        document.getElementById('codeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });
        
        // Effet de focus
        document.getElementById('codeInput').addEventListener('focus', function() {
            this.parentElement.style.transform = 'scale(1.02)';
        });
        
        document.getElementById('codeInput').addEventListener('blur', function() {
            this.parentElement.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
